<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel="stylesheet" href="style.css">
    <title>도현 | dohyun.0</title>
    <script src="https://kit.fontawesome.com/448be2c471.js" crossorigin="anonymous"></script>
</head>


<body>
    <header class="navbar">
        <div class="logo intro" style="padding-left: 5%;">dohyun.0</div>
        <div class="menu" style="padding-right: 5%;">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="team.html">Team</a>
        </div>
    </header>

    <main class="flex h-[95vh] w-full items-center justify-center text-left">
        <div class="flex-col flex h-[95vh] w-full items-center justify-center text-left"> <img alt="Profile"
                loading="lazy" width="128" height="128" decoding="async" data-nimg="1" class="avatar"
                style="color:transparent" src="/img/profile.jpg" />
            <div class="flex flex-row justify-center ">
                <h1 class="text-4xl font-black">도현</h1>
                <h2 class="mt-[20px] text-[10pt] text-gray-400">@dohyun.0</h2>
            </div>
            <div class="flex flex-row justify-center ">
                <p>Team. <span class="team-items" href="">Dawn inc</span> | Discord Bot Developer</p>
            </div>
        </div>
    </main>
</body>

</html>
<script>
    var items = document.querySelector(".team-items");
    list_item = ["Dawn inc", "月구인구직", "꽃의 정원"]
    var i = 0
    const team_changer = () => {
        items.style.opacity = 0; // 변경 전 투명도 설정
        setTimeout(() => {
            items.innerHTML = list_item[i++ % list_item.length];
            items.style.opacity = 1; // 변경 후 투명도 설정
        }, 300); // 300밀리초 후 변경
        setTimeout(team_changer, 3000); // 3초마다 함수 재호출
    }
    team_changer();
</script>
